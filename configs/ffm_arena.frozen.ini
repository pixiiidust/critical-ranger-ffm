# Frozen shared arena constants for Part C0.1 repeatability.
# Shared by baseline and agent — do not change between comparison runs.
# The seed may vary; these constants may not.
grid_width=128
grid_height=128
min_gate_grid_size=128
connectivity=4
p=0.01
f=0.000001
warmup_steps=10000
cluster_target=2000
max_steps=1500000

# Hard repeatability gates. A seed sweep fails if spread exceeds these values.
repeatability_density_max_range=0.01
repeatability_slope_max_range=0.08
repeatability_min_orders_of_magnitude=1.5
repeatability_max_overlap_rate=0.10
